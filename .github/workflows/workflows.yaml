name: ci
on:
  push:
    branches: [main]
  # pull_request:
  #   branches: [main]

jobs: 
  test: 
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: run ci
        run: npm ci
        
      - name: run tests
        run: npm test

      

  lint: 
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: run ci
        run: npm ci
        
      - name: linter
        run: npm run lint
